name: Release DMG + Appcast

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Tuist
        run: brew install tuist

      - name: Install Tuist dependencies
        run: TUIST_SKIP_UPDATE_CHECK=1 tuist install

      - name: Validate Sparkle secrets
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_ED_KEY" ] || [ -z "$SPARKLE_PUBLIC_ED_KEY" ]; then
            echo "SPARKLE_PRIVATE_ED_KEY and SPARKLE_PUBLIC_ED_KEY must be configured."
            exit 1
          fi

      - name: Validate release metadata inputs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then
            echo "Release version could not be derived from tag ${GITHUB_REF_NAME}."
            exit 1
          fi
          if [ -z "${GITHUB_RUN_NUMBER}" ]; then
            echo "GITHUB_RUN_NUMBER must be available for release builds."
            exit 1
          fi

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        if: ${{ env.APPLE_CERTIFICATE_P12_BASE64 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.APPLE_SIGNING_IDENTITY != '' }}
        run: |
          CERT_PATH="$RUNNER_TEMP/signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -f pkcs12 -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Package DMG
        id: package
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MENU_STATUS_BUILD: ${{ github.run_number }}
          MENU_STATUS_FEED_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/appcast.xml
          MENU_STATUS_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          ./package-app.sh "${GITHUB_REF_NAME#v}"

      - name: Detect release channel
        id: channel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.artifact_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.channel.outputs.prerelease }}

      - name: Generate appcast.xml
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_PATH="${{ steps.package.outputs.artifact_path }}"
          ARTIFACT_NAME="${{ steps.package.outputs.artifact_name }}"
          SPARKLE_BIN="Tuist/.build/artifacts/sparkle/Sparkle/bin"
          APPCAST_WORK_DIR="$RUNNER_TEMP/appcast"
          PAGES_DIR="$RUNNER_TEMP/pages"

          mkdir -p "$APPCAST_WORK_DIR" "$PAGES_DIR"

          # Pull every prior release's DMG so the appcast enumerates the full history.
          # This lets beta users see the latest stable (and vice versa) instead of only
          # whichever tag was pushed last.
          while read -r tag; do
            [ -z "$tag" ] && continue
            gh release download "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --dir "$APPCAST_WORK_DIR" \
              --pattern "*.dmg" \
              --skip-existing || true
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 --json tagName --jq '.[].tagName')

          # Always include the freshly built artifact — the release-asset upload above
          # may not be visible yet when this step runs.
          cp -f "$ARTIFACT_PATH" "$APPCAST_WORK_DIR/$ARTIFACT_NAME"

          # generate_appcast emits one <item> per .dmg, computing Sparkle EdDSA signatures
          # from binary contents. The --download-url-prefix below is a placeholder — the
          # Python post-process step rewrites each enclosure URL to the correct per-tag
          # GitHub Releases path.
          echo "$SPARKLE_PRIVATE_ED_KEY" | "$SPARKLE_BIN/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/__placeholder__/" \
            "$APPCAST_WORK_DIR"

          # Post-process: tag pre-release items with <sparkle:channel>beta</sparkle:channel>
          # and rewrite each enclosure URL to releases/download/v<version>/<filename>.
          python3 - "$APPCAST_WORK_DIR/appcast.xml" "$GITHUB_REPOSITORY" <<'PYEOF'
          import sys
          from xml.etree import ElementTree as ET

          SPARKLE_NS = "http://www.andymatuschak.org/xml-namespaces/sparkle"
          ET.register_namespace("sparkle", SPARKLE_NS)

          appcast_path, repo = sys.argv[1], sys.argv[2]
          tree = ET.parse(appcast_path)

          for item in tree.getroot().iter("item"):
              short_ver = item.find(f"{{{SPARKLE_NS}}}shortVersionString")
              if short_ver is None or not short_ver.text:
                  continue
              version = short_ver.text.strip()

              if "-" in version and item.find(f"{{{SPARKLE_NS}}}channel") is None:
                  channel = ET.SubElement(item, f"{{{SPARKLE_NS}}}channel")
                  channel.text = "beta"

              enclosure = item.find("enclosure")
              if enclosure is not None:
                  filename = enclosure.get("url", "").rsplit("/", 1)[-1]
                  if filename:
                      enclosure.set(
                          "url",
                          f"https://github.com/{repo}/releases/download/v{version}/{filename}",
                      )

          tree.write(appcast_path, xml_declaration=True, encoding="utf-8")
          PYEOF

          cp "$APPCAST_WORK_DIR/appcast.xml" "$PAGES_DIR/appcast.xml"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/pages

  deploy-appcast:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
